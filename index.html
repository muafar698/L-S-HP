<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Läshastighetstränare</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: #e0e0e0;
}
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}
textarea {
    width: 100%;
    height: 300px;
    background: #1e1e1e;
    color: #e0e0e0;
    border: none;
    padding: 10px;
    font-size: 16px;
}
.controls {
    margin-top: 10px;
    display: flex;
    gap: 10px;
    align-items: center;
}
button {
    padding: 10px;
    cursor: pointer;
}
.highlight {
    background: #ffd54f;
    color: black;
}
#display {
    margin-top: 20px;
    font-size: 24px;
    line-height: 1.6;
}
</style>
</head>
<body>
<div class="container">
    <h2>Läshastighetstränare</h2>

    <textarea id="inputText" placeholder="Klistra in text här..."></textarea>

    <div class="controls">
        <button onclick="startReading()">Starta</button>
        <button onclick="togglePause()" id="pauseBtn">Paus</button>

        <input type="range" id="wpm" min="100" max="600" value="250" oninput="updateWPM()">
        <span id="wpmLabel">250 WPM</span>
    </div>

    <div class="controls">
        <span id="wordCount">Ord: 0</span>
        <span id="timer">Tid: 0.0 s</span>
        <span id="result"></span>
    </div>

    <div id="display"></div>
</div>

<script>
let words = [];
let index = 0;
let running = false;
let paused = false;
let startTime = 0;
let pauseTime = 0;
let pauseStart = 0;
let timerInterval;

function updateWPM() {
    document.getElementById("wpmLabel").innerText = document.getElementById("wpm").value + " WPM";
}

function startReading() {
    if (running) return;

    let text = document.getElementById("inputText").value;
    words = text.match(/\S+/g) || [];
    index = 0;

    document.getElementById("wordCount").innerText = "Ord: " + words.length;
    if (words.length === 0) return;

    running = true;
    paused = false;
    startTime = Date.now();
    pauseTime = 0;

    timerInterval = setInterval(updateTimer, 100);
    runReader();
}

function togglePause() {
    if (!running) return;

    if (!paused) {
        paused = true;
        pauseStart = Date.now();
        document.getElementById("pauseBtn").innerText = "Återuppta";
    } else {
        paused = false;
        pauseTime += Date.now() - pauseStart;
        document.getElementById("pauseBtn").innerText = "Paus";
        runReader();
    }
}

function runReader() {
    if (!running || paused) return;

    if (index >= words.length) {
        finishReading();
        return;
    }

    let display = document.getElementById("display");

    display.innerHTML = words.map((w, i) =>
        i === index ? `<span class="highlight">${w}</span>` : w
    ).join(" ");

    index++;

    let wpm = document.getElementById("wpm").value;
    let delay = 60000 / wpm;

    setTimeout(runReader, delay);
}

function updateTimer() {
    let elapsed = (Date.now() - startTime - pauseTime) / 1000;
    document.getElementById("timer").innerText = "Tid: " + elapsed.toFixed(1) + " s";
}

function finishReading() {
    running = false;
    clearInterval(timerInterval);

    let totalTime = (Date.now() - startTime - pauseTime) / 1000;
    let totalWords = words.length;
    let wpm = Math.round((totalWords / totalTime) * 60);

    document.getElementById("result").innerText =
        `Klar! Tid: ${totalTime.toFixed(1)}s | Ord: ${totalWords} | Hastighet: ${wpm} WPM`;
}
</script>
</body>
</html>
